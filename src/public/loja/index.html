<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beleza Multi Marcas — em breve</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Nunito+Sans:wght@400;600;700&display=swap');
    *,*::before,*::after{box-sizing:border-box}
    body{
      margin:0;min-height:100vh;font-family:'Nunito Sans',system-ui,sans-serif;color:#2B2B2B;
      background:radial-gradient(1100px 520px at 50% -10%, #E7D5CE 0%, transparent 60%), #FAF8F6;
      display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;text-align:center;
    }
    .mark{width:64px;height:64px;border-radius:18px;margin-bottom:18px;
      background:linear-gradient(135deg,#B76E79,#d79aa0);display:flex;align-items:center;justify-content:center;
      color:#fff;font-size:1.7rem;box-shadow:0 8px 22px rgba(183,110,121,.4)}
    h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:2.6rem;margin:0;color:#3a2b2b}
    p{color:#6B6B6B;max-width:420px;margin:.5rem 0 0}
    .tag{margin-top:22px;font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;color:#B76E79;font-weight:700}
    .admin{position:fixed;bottom:16px;right:18px;font-size:.78rem;color:#a89a93;text-decoration:none}
    .admin:hover{color:#B76E79}
  </style>
</head>
<body>
  <img class="mark" src="/loja/emblem.svg" alt="" style="background:transparent;box-shadow:none;width:72px;height:72px">
  <h1>Beleza Multi Marcas</h1>
  <p>Nossa loja está sendo preparada com muito carinho. Em breve você poderá comprar os produtos das suas marcas favoritas por aqui.</p>
  <div class="tag">Em breve</div>
  <a class="admin" href="/login.html"><i class="bi bi-lock"></i> Área administrativa</a>
</body>
</html>

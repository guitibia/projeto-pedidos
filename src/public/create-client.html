<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastrar Cliente</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<button class="sidebar-toggle" id="sidebarToggle">☰</button>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="system-name">📦 Sistema de Pedidos</div>
    <div class="user-name" id="sidebar-user">Carregando...</div>
  </div>
  <nav class="sidebar-nav">
    <a class="nav-link" href="/">Dashboard</a>
    <a class="nav-link active" href="/create-client.html">Cadastrar Cliente</a>
    <a class="nav-link" href="/create-product.html">Cadastrar Produto</a>
    <a class="nav-link" href="/create-order.html">Criar Pedido</a>
    <a class="nav-link" href="/list-orders.html">Listar Pedidos</a>
    <a class="nav-link" href="/list-clients.html">Listar Clientes</a>
    <a class="nav-link" href="/promissorias.html">Promissórias</a>
  </nav>
  <div class="sidebar-footer">
    <button class="btn-logout" id="btn-logout">Sair</button>
  </div>
</div>

<div class="main-content">
  <div class="container py-2">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card">
          <div class="card-header bg-primary text-white text-center">Cadastro de Cliente</div>
          <div class="card-body p-4">
            <form id="clientForm">
              <div class="mb-3">
                <label class="form-label">Nome completo</label>
                <input type="text" class="form-control" id="name" placeholder="Nome do cliente" required>
              </div>
              <div class="mb-3">
                <label class="form-label">CEP</label>
                <input type="text" class="form-control" id="cep" placeholder="00000-000">
              </div>
              <div class="mb-3">
                <label class="form-label">Endereço</label>
                <input type="text" class="form-control" id="address" placeholder="Rua / Avenida" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Bairro</label>
                <input type="text" class="form-control" id="neighborhood" placeholder="Bairro" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Número</label>
                <input type="text" class="form-control" id="houseNumber" placeholder="Número" required>
              </div>
              <div class="mb-4">
                <label class="form-label">Telefone</label>
                <input type="text" class="form-control" id="phone" placeholder="(XX) XXXXX-XXXX">
              </div>
              <button type="submit" class="btn btn-primary w-100">Cadastrar Cliente</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<footer class="bg-dark text-white text-center py-3 mt-4">
  <small>&copy; 2025 Sistema de Pedidos</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
<script src="/js/auth.js"></script>
<script>
  Auth.requireAuth();
  Auth.initSidebar();
  document.getElementById('sidebarToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));

  document.getElementById('cep').addEventListener('blur', async () => {
    const cep = document.getElementById('cep').value.replace(/\D/g, '');
    if (cep.length !== 8) return;
    try {
      const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
      const data = await res.json();
      if (data.erro) return Swal.fire('Aviso', 'CEP não encontrado.', 'warning');
      const addr = document.getElementById('address');
      const neigh = document.getElementById('neighborhood');
      addr.value = data.logradouro || '';
      neigh.value = data.bairro || '';
      addr.readOnly = !!data.logradouro;
      neigh.readOnly = !!data.bairro;
    } catch { /* silencioso */ }
  });

  document.getElementById('clientForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const payload = {
      name:         document.getElementById('name').value.trim(),
      address:      document.getElementById('address').value.trim(),
      houseNumber:  document.getElementById('houseNumber').value.trim(),
      neighborhood: document.getElementById('neighborhood').value.trim(),
      phone:        document.getElementById('phone').value.replace(/\D/g, '')
    };

    try {
      const res = await Auth.apiFetch('/api/clients', {
        method: 'POST',
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) return Swal.fire('Erro', data.error, 'error');
      Swal.fire('Sucesso', 'Cliente cadastrado com sucesso!', 'success');
      document.getElementById('clientForm').reset();
      document.getElementById('address').readOnly = false;
      document.getElementById('neighborhood').readOnly = false;
    } catch (err) {
      Swal.fire('Erro', 'Erro ao conectar ao servidor.', 'error');
    }
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beleza & Cia</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Nunito+Sans:wght@300;400;600;700;800&display=swap');
    :root{
      --bg:#FAF8F6; --surface:#FFFFFF; --text:#2B2B2B; --text-soft:#6B6B6B;
      --accent:#B76E79; --accent-dark:#9d5b66; --accent-soft:#E7D5CE; --border:#EADFD9;
      --shadow:0 14px 40px rgba(60,40,35,.12);
    }
    *,*::before,*::after{box-sizing:border-box}
    body{
      margin:0;min-height:100vh;font-family:'Nunito Sans',system-ui,sans-serif;
      color:var(--text);background:
        radial-gradient(1100px 520px at 50% -10%, var(--accent-soft) 0%, transparent 60%),
        var(--bg);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:32px 20px;
    }
    a{text-decoration:none;color:inherit}
    .brand{ text-align:center;margin-bottom:34px; }
    .brand-mark{
      width:64px;height:64px;border-radius:18px;margin:0 auto 16px;
      background:linear-gradient(135deg,var(--accent),#d79aa0);
      display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.7rem;
      box-shadow:0 8px 22px rgba(183,110,121,.4);
    }
    .brand h1{
      font-family:'Cormorant Garamond',serif;font-weight:600;font-size:2.6rem;
      margin:0;letter-spacing:.5px;color:#3a2b2b;
    }
    .brand p{ margin:.35rem 0 0;color:var(--text-soft);font-size:1rem; }
    .cards{
      display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px;
      width:100%;max-width:680px;
    }
    @media (max-width:620px){ .cards{ grid-template-columns:1fr; } }
    .card{
      background:var(--surface);border:1px solid var(--border);border-radius:20px;
      padding:30px 26px;display:flex;flex-direction:column;align-items:flex-start;gap:10px;
      box-shadow:0 4px 16px rgba(60,40,35,.05);
      transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    .card:hover{ transform:translateY(-4px);box-shadow:var(--shadow);border-color:var(--accent-soft); }
    .card .ic{
      width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;
      font-size:1.3rem;margin-bottom:4px;
    }
    .card.loja .ic{ background:var(--accent-soft);color:var(--accent-dark); }
    .card.painel .ic{ background:#eef0f2;color:#5b6470; }
    .card h2{ font-size:1.15rem;margin:0;font-weight:800; }
    .card p{ margin:0;color:var(--text-soft);font-size:.9rem;flex:1; }
    .go{
      margin-top:14px;display:inline-flex;align-items:center;gap:.5rem;
      border-radius:999px;font-weight:700;font-size:.92rem;padding:.62rem 1.25rem;
      transition:background .18s, color .18s, border-color .18s;
    }
    .card.loja .go{ background:var(--accent);color:#fff; }
    .card.loja:hover .go{ background:var(--accent-dark); }
    .card.painel .go{ background:transparent;color:var(--text);border:1px solid var(--border); }
    .card.painel:hover .go{ border-color:#c9ced4;background:#f4f5f7; }
    :focus-visible{ outline:2px solid var(--accent);outline-offset:3px;border-radius:14px; }
    footer{ margin-top:38px;color:var(--text-soft);font-size:.8rem;text-align:center; }
    @media (prefers-reduced-motion:reduce){ *{transition:none!important} }
  </style>
</head>
<body>

  <div class="brand">
    <div class="brand-mark"><i class="bi bi-flower1"></i></div>
    <h1>Beleza &amp; Cia</h1>
    <p>Suas marcas favoritas em um só lugar</p>
  </div>

  <div class="cards">
    <a class="card loja" href="/loja/">
      <div class="ic"><i class="bi bi-bag-heart"></i></div>
      <h2>Entrar na Loja</h2>
      <p>Conheça os produtos da Natura, Avon, Boticário, Eudora e Abelha Rainha.</p>
      <span class="go">Ver produtos <i class="bi bi-arrow-right"></i></span>
    </a>

    <a class="card painel" href="/login.html">
      <div class="ic"><i class="bi bi-grid-1x2"></i></div>
      <h2>Acessar o Painel</h2>
      <p>Área administrativa para gestão de pedidos, estoque e clientes.</p>
      <span class="go">Fazer login <i class="bi bi-box-arrow-in-right"></i></span>
    </a>
  </div>

  <footer>© <span id="ano"></span> Beleza &amp; Cia</footer>
  <script>document.getElementById('ano').textContent = new Date().getFullYear();</script>
</body>
</html>

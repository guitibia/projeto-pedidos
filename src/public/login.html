<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Sistema de Pedidos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      color: #e6edf3;
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow: hidden;
    }

    /* Subtle dot grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(56,139,253,.18) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient glow behind the card */
    body::after {
      content: '';
      position: fixed;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(31,111,235,.10) 0%, transparent 65%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 1rem;
      position: relative;
      z-index: 1;
    }

    /* ── Card ── */
    .login-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 18px;
      box-shadow: 0 8px 40px rgba(0,0,0,.65), 0 2px 8px rgba(0,0,0,.4);
      overflow: hidden;
    }

    /* ── Brand header ── */
    .login-brand {
      padding: 2rem 2rem 1.5rem;
      text-align: center;
      border-bottom: 1px solid #21262d;
      background: linear-gradient(to bottom, rgba(56,139,253,.04), transparent);
    }

    .login-brand-icon {
      width: 58px;
      height: 58px;
      border-radius: 16px;
      background: linear-gradient(135deg, #1d4ed8, #388bfd);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.65rem;
      color: #fff;
      box-shadow: 0 4px 18px rgba(56,139,253,.40);
      margin-bottom: 1rem;
    }

    .login-brand h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #f0f6fc;
      margin: 0 0 .3rem;
      letter-spacing: -.3px;
    }

    .login-brand p {
      font-size: .82rem;
      color: #8b949e;
      margin: 0;
    }

    /* ── Form body ── */
    .login-body {
      padding: 1.75rem 2rem 2rem;
    }

    .form-group { margin-bottom: 1.1rem; }

    label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      color: #8b949e;
      margin-bottom: .35rem;
      letter-spacing: .1px;
    }

    .input-wrap { position: relative; }

    .input-wrap .input-icon {
      position: absolute;
      left: .875rem;
      top: 50%;
      transform: translateY(-50%);
      color: #484f58;
      font-size: .95rem;
      pointer-events: none;
      transition: color .15s;
      z-index: 1;
    }

    .input-wrap input {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 9px;
      color: #e6edf3;
      font-family: inherit;
      font-size: .9rem;
      padding: .6rem .875rem .6rem 2.5rem;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      -webkit-font-smoothing: antialiased;
    }

    .input-wrap input::placeholder { color: #484f58; }

    .input-wrap input:focus {
      border-color: #388bfd;
      box-shadow: 0 0 0 3px rgba(56,139,253,.20);
    }

    .input-wrap input:focus + .input-icon,
    .input-wrap input:not(:placeholder-shown) + .input-icon {
      color: #8b949e;
    }

    /* Show/hide password toggle */
    .input-wrap .toggle-pass {
      position: absolute;
      right: .625rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #484f58;
      cursor: pointer;
      padding: .25rem .375rem;
      font-size: 1rem;
      line-height: 1;
      border-radius: 6px;
      transition: color .15s, background .15s;
    }

    .input-wrap .toggle-pass:hover {
      color: #8b949e;
      background: rgba(255,255,255,.05);
    }

    .input-wrap input[type="password"],
    .input-wrap input.has-toggle { padding-right: 2.75rem; }

    /* ── Submit button ── */
    .btn-login {
      width: 100%;
      padding: .65rem;
      font-family: inherit;
      font-size: .9rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #1d4ed8, #388bfd);
      border: none;
      border-radius: 9px;
      cursor: pointer;
      transition: opacity .15s, box-shadow .15s, transform .1s;
      box-shadow: 0 4px 14px rgba(56,139,253,.35);
      margin-top: .5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
    }

    .btn-login:hover {
      opacity: .92;
      box-shadow: 0 6px 22px rgba(56,139,253,.45);
      transform: translateY(-1px);
    }

    .btn-login:active { transform: translateY(0); opacity: 1; }
    .btn-login:disabled { opacity: .65; transform: none; cursor: not-allowed; }

    /* ── Footer ── */
    .login-footer {
      padding: .75rem 2rem;
      border-top: 1px solid #21262d;
      text-align: center;
    }

    .login-footer small { font-size: .75rem; color: #484f58; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">

      <div class="login-brand">
        <div class="login-brand-icon">
          <i class="bi bi-box-seam-fill"></i>
        </div>
        <h1>Sistema de Pedidos</h1>
        <p>Faça login para continuar</p>
      </div>

      <div class="login-body">
        <form id="loginForm" autocomplete="on">

          <div class="form-group">
            <label for="username">Usuário</label>
            <div class="input-wrap">
              <input
                type="text"
                id="username"
                placeholder="Digite seu usuário"
                autocomplete="username"
                autofocus
                required>
              <i class="bi bi-person input-icon"></i>
            </div>
          </div>

          <div class="form-group">
            <label for="password">Senha</label>
            <div class="input-wrap">
              <input
                type="password"
                id="password"
                class="has-toggle"
                placeholder="Digite sua senha"
                autocomplete="current-password"
                required>
              <i class="bi bi-lock input-icon"></i>
              <button
                type="button"
                class="toggle-pass"
                id="togglePass"
                aria-label="Mostrar ou ocultar senha">
                <i class="bi bi-eye" id="togglePassIcon"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn-login" id="btnLogin">
            <i class="bi bi-box-arrow-in-right"></i>
            <span>Entrar</span>
          </button>

        </form>
      </div>

      <div class="login-footer">
        <small>&copy; 2025 Sistema de Pedidos</small>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    if (Auth.isLoggedIn()) window.location.href = '/painel.html';

    // Password show/hide toggle
    document.getElementById('togglePass').addEventListener('click', () => {
      const pwd  = document.getElementById('password');
      const icon = document.getElementById('togglePassIcon');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        pwd.type = 'password';
        icon.className = 'bi bi-eye';
      }
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn      = document.getElementById('btnLogin');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> <span>Entrando...</span>';

      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (!res.ok) {
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i><span>Entrar</span>';
          return Swal.fire({
            icon: 'error',
            title: 'Erro ao entrar',
            text: data.error || 'Credenciais inválidas.',
            background: '#161b22',
            color: '#e6edf3',
            confirmButtonColor: '#388bfd'
          });
        }

        Auth.setSession(data.token, data.user);
        window.location.href = '/painel.html';
      } catch (err) {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i><span>Entrar</span>';
        Swal.fire({
          icon: 'error',
          title: 'Erro de conexão',
          text: 'Não foi possível conectar ao servidor.',
          background: '#161b22',
          color: '#e6edf3',
          confirmButtonColor: '#388bfd'
        });
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Sistema de Pedidos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <style>
    body { background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { width: 100%; max-width: 380px; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.10); }
    .login-header { background: #343a40; border-radius: 16px 16px 0 0; padding: 2rem; text-align: center; }
    .login-header h4 { color: #fff; margin: 0; font-weight: 600; letter-spacing: 0.5px; }
    .login-header p { color: #adb5bd; margin: 4px 0 0; font-size: 13px; }
  </style>
</head>
<body>
  <div class="login-card card border-0">
    <div class="login-header">
      <h4>📦 Sistema de Pedidos</h4>
      <p>Faça login para continuar</p>
    </div>
    <div class="card-body p-4">
      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label">Usuário</label>
          <input type="text" id="username" class="form-control" placeholder="Digite seu usuário" autofocus required>
        </div>
        <div class="mb-4">
          <label class="form-label">Senha</label>
          <input type="password" id="password" class="form-control" placeholder="Digite sua senha" required>
        </div>
        <button type="submit" class="btn btn-dark w-100">Entrar</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    // Se já estiver logado, redirecionar
    if (Auth.isLoggedIn()) window.location.href = '/';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok) {
          return Swal.fire('Erro', data.error || 'Credenciais inválidas.', 'error');
        }

        Auth.setSession(data.token, data.user);
        window.location.href = '/';
      } catch (err) {
        Swal.fire('Erro', 'Não foi possível conectar ao servidor.', 'error');
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Pedido</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<button class="sidebar-toggle" id="sidebarToggle">☰</button>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="system-name">📦 Sistema de Pedidos</div>
    <div class="user-name" id="sidebar-user">Carregando...</div>
  </div>
  <nav class="sidebar-nav">
    <a class="nav-link" href="/">Dashboard</a>
    <a class="nav-link" href="/create-client.html">Cadastrar Cliente</a>
    <a class="nav-link" href="/create-product.html">Cadastrar Produto</a>
    <a class="nav-link active" href="/create-order.html">Criar Pedido</a>
    <a class="nav-link" href="/list-orders.html">Listar Pedidos</a>
    <a class="nav-link" href="/list-clients.html">Listar Clientes</a>
    <a class="nav-link" href="/promissorias.html">Promissórias</a>
  </nav>
  <div class="sidebar-footer">
    <button class="btn-logout" id="btn-logout">Sair</button>
  </div>
</div>

<div class="main-content">
  <div class="container py-2">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card">
          <div class="card-header bg-primary text-white text-center">Criar Pedido</div>
          <div class="card-body p-4">
            <form id="orderForm">
              <div class="mb-3">
                <label class="form-label">Cliente</label>
                <select id="clientId" class="form-select" required>
                  <option value="">Selecione um cliente</option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label">Franquia</label>
                <select id="franchiseId" class="form-select" required>
                  <option value="">Selecione uma franquia</option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label">Produto</label>
                <select id="products" class="form-select">
                  <option value="">Selecione um produto</option>
                </select>
              </div>

              <div class="row mb-3">
                <div class="col">
                  <label class="form-label">Quantidade</label>
                  <input type="number" id="productQuantity" class="form-control" value="1" min="1">
                </div>
                <div class="col">
                  <label class="form-label">Custo</label>
                  <input type="text" id="productCost" class="form-control" readonly>
                </div>
                <div class="col">
                  <label class="form-label">Valor de Venda</label>
                  <input type="number" step="0.01" id="salePrice" class="form-control" placeholder="0,00">
                </div>
              </div>

              <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="promotionalPrice">
                <label class="form-check-label" for="promotionalPrice">Produto com valor promocional</label>
              </div>

              <button type="button" id="addProductBtn" class="btn btn-info w-100 mb-2">+ Adicionar Produto</button>
              <ul id="productList" class="list-group mb-3"></ul>

              <div class="mb-3">
                <label class="form-label">Valor Total da Compra</label>
                <input type="text" id="totalValue" class="form-control" readonly>
              </div>

              <div class="mb-3">
                <label class="form-label">Método de Pagamento</label>
                <select id="paymentMethod" class="form-select" required>
                  <option value="">Selecione o método</option>
                  <option>PIX</option>
                  <option>DINHEIRO</option>
                  <option>CARTÃO DE CRÉDITO</option>
                  <option>PARCELADO</option>
                  <option>PAGAMENTO COMBINADO</option>
                </select>
              </div>

              <div id="combinedPaymentDiv" class="mb-3" style="display:none">
                <label class="form-label">Valor pago via PIX/Dinheiro</label>
                <input type="number" step="0.01" id="combinedPaymentValue" class="form-control">
              </div>

              <div id="installmentsDiv" class="mb-3" style="display:none">
                <label class="form-label">Número de Parcelas</label>
                <select id="installments" class="form-select">
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                </select>
                <small id="installmentAmount" class="text-muted mt-1 d-none fw-500"></small>
              </div>

              <button type="submit" class="btn btn-success w-100">Criar Pedido</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<footer class="bg-dark text-white text-center py-3 mt-4">
  <small>&copy; 2025 Sistema de Pedidos</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
<script src="/js/auth.js"></script>
<script>
  Auth.requireAuth();
  Auth.initSidebar();
  document.getElementById('sidebarToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));

  let totalValue = 0;
  let productsList = [];

  // Carregar clientes e franquias
  async function init() {
    const [clientRes, franchiseRes] = await Promise.all([
      Auth.apiFetch('/api/clients'),
      Auth.apiFetch('/api/franchises')
    ]);
    const clients   = await clientRes.json();
    const franchises = await franchiseRes.json();

    const cs = document.getElementById('clientId');
    clients.forEach(c => cs.insertAdjacentHTML('beforeend', `<option value="${c.id}">${c.name}</option>`));

    const fs = document.getElementById('franchiseId');
    franchises.forEach(f => fs.insertAdjacentHTML('beforeend', `<option value="${f}">${f}</option>`));
  }
  init();

  document.getElementById('franchiseId').addEventListener('change', async (e) => {
    const f = e.target.value;
    const ps = document.getElementById('products');
    ps.innerHTML = '<option value="">Selecione um produto</option>';
    if (!f) return;
    const res = await Auth.apiFetch(`/api/products?franchise=${encodeURIComponent(f)}`);
    const data = await res.json();
    data.forEach(p => ps.insertAdjacentHTML('beforeend', `<option value="${p.id}" data-cost="${p.cost}">${p.name} — COD ${p.code}</option>`));
  });

  document.getElementById('products').addEventListener('change', (e) => {
    const opt = e.target.selectedOptions[0];
    document.getElementById('productCost').value = opt?.dataset.cost ? parseFloat(opt.dataset.cost).toFixed(2) : '';
  });

  document.getElementById('promotionalPrice').addEventListener('change', (e) => {
    document.getElementById('productCost').readOnly = !e.target.checked;
  });

  document.getElementById('addProductBtn').addEventListener('click', () => {
    const sel      = document.getElementById('products');
    const opt      = sel.selectedOptions[0];
    const productId = sel.value;
    const salePrice = parseFloat(document.getElementById('salePrice').value);
    const qty       = parseInt(document.getElementById('productQuantity').value) || 1;
    const isPromo   = document.getElementById('promotionalPrice').checked;
    const cost      = parseFloat(document.getElementById('productCost').value);

    if (!productId || isNaN(salePrice) || salePrice <= 0 || qty < 1) {
      return Swal.fire('Erro', 'Preencha produto, valor de venda e quantidade corretamente.', 'error');
    }

    const [productName, codePart] = opt.textContent.split(' — COD ');
    const totalProduct = salePrice * qty;

    const li = document.createElement('li');
    li.className = 'list-group-item d-flex justify-content-between align-items-center';
    li.innerHTML = `<span>${productName} × ${qty} — R$ ${totalProduct.toFixed(2)}${isPromo ? ' 🏷️' : ''}</span>
      <button class="btn btn-danger btn-sm">Remover</button>`;
    li.querySelector('button').onclick = () => {
      productList = productList.filter(p => p !== entry);
      li.remove();
      totalValue -= totalProduct;
      document.getElementById('totalValue').value = totalValue.toFixed(2);
    };
    document.getElementById('productList').appendChild(li);

    const entry = { id: productId, salePrice, quantity: qty, isPromotionalPrice: isPromo, productCost: isPromo ? cost : null };
    productsList.push(entry);
    totalValue += totalProduct;
    document.getElementById('totalValue').value = totalValue.toFixed(2);
  });

  document.getElementById('paymentMethod').addEventListener('change', (e) => {
    const m = e.target.value;
    document.getElementById('installmentsDiv').style.display   = (m === 'PARCELADO' || m === 'PAGAMENTO COMBINADO') ? 'block' : 'none';
    document.getElementById('combinedPaymentDiv').style.display = m === 'PAGAMENTO COMBINADO' ? 'block' : 'none';
  });

  document.getElementById('installments').addEventListener('change', updateInstallmentAmount);
  document.getElementById('combinedPaymentValue').addEventListener('input', updateInstallmentAmount);

  function updateInstallmentAmount() {
    const combined = parseFloat(document.getElementById('combinedPaymentValue').value) || 0;
    const n = parseInt(document.getElementById('installments').value) || 1;
    const remaining = Math.max(totalValue - combined, totalValue);
    const small = document.getElementById('installmentAmount');
    small.textContent = `Parcela: R$ ${(remaining / n).toFixed(2)}`;
    small.classList.remove('d-none');
  }

  document.getElementById('orderForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (productsList.length === 0) return Swal.fire('Erro', 'Adicione ao menos um produto.', 'error');

    const payload = {
      clientId:             document.getElementById('clientId').value,
      paymentMethod:        document.getElementById('paymentMethod').value,
      products:             productsList,
      totalValue,
      installments:         document.getElementById('installments').value || null,
      combinedPaymentValue: document.getElementById('combinedPaymentValue').value || null
    };

    try {
      const res  = await Auth.apiFetch('/api/orders', { method: 'POST', body: JSON.stringify(payload) });
      const data = await res.json();
      if (!res.ok) return Swal.fire('Erro', data.error, 'error');
      Swal.fire('Sucesso', `Pedido #${data.orderId} criado!`, 'success');
      document.getElementById('orderForm').reset();
      document.getElementById('productList').innerHTML = '';
      productsList = []; totalValue = 0;
      document.getElementById('totalValue').value = '';
    } catch {
      Swal.fire('Erro', 'Erro ao conectar ao servidor.', 'error');
    }
  });
</script>
</body>
</html>

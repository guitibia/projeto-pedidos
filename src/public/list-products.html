<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Produtos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .form-page-hero {
      display: flex; align-items: center; gap: 1rem; margin-bottom: 0;
    }
    .form-page-icon {
      width: 52px; height: 52px; border-radius: 14px;
      background: linear-gradient(135deg, #f78166 0%, #ff9a00 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; color: #fff; flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(255,154,0,.35);
    }
    .form-page-title { font-size: 1.3rem; font-weight: 700; margin: 0; }
    .form-page-sub   { font-size: .8rem; color: var(--text-muted); margin: 0; }

    .search-wrap { position: relative; }
    .search-wrap i {
      position: absolute; left: .8rem; top: 50%;
      transform: translateY(-50%); color: var(--text-muted); pointer-events: none;
    }
    .search-wrap input {
      background: var(--card-bg); border: 1px solid var(--border-color);
      border-radius: 10px; color: var(--text-color); font-size: .88rem;
      padding: .48rem 1rem .48rem 2.3rem; width: 260px;
    }
    .search-wrap input:focus { outline: none; border-color: #ff9a00; box-shadow: 0 0 0 3px rgba(255,154,0,.15); }
    .search-wrap input::placeholder { color: #484f58; }

    /* ── Franchise accordion ── */
    .franchise-block { margin-bottom: .6rem; }

    .franchise-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: .65rem 1rem;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      cursor: pointer;
      user-select: none;
      transition: border-color .15s, background .15s;
    }
    .franchise-header:hover { border-color: #ff9a00; background: rgba(255,154,0,.04); }
    .franchise-header.open  { border-radius: 12px 12px 0 0; border-bottom-color: transparent; }

    .franchise-header-left { display: flex; align-items: center; gap: .6rem; }
    .franchise-icon {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0;
    }
    .franchise-name { font-size: .9rem; font-weight: 700; }
    .franchise-count {
      font-size: .72rem; color: var(--text-muted);
      background: rgba(255,255,255,.06); border: 1px solid var(--border-color);
      border-radius: 20px; padding: .1rem .55rem; margin-left: .25rem;
    }
    .franchise-chevron {
      color: var(--text-muted); font-size: .85rem;
      transition: transform .2s ease;
    }
    .franchise-header.open .franchise-chevron { transform: rotate(90deg); }

    .franchise-body {
      display: none;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-top: none;
      border-radius: 0 0 12px 12px;
      padding: .35rem .5rem .5rem;
    }
    .franchise-body.open { display: block; }

    /* ── Product rows ── */
    .product-row {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      align-items: center; gap: .75rem;
      padding: .5rem .75rem;
      border-radius: 8px; margin-bottom: .25rem;
      border: 1px solid transparent;
      transition: background .12s, border-color .12s;
      cursor: pointer;
    }
    .product-row:hover { background: rgba(255,154,0,.06); border-color: rgba(255,154,0,.2); }
    .product-field { font-size: .875rem; color: var(--text-color); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .product-code {
      font-size: .75rem; color: var(--text-muted); font-family: monospace;
      background: rgba(255,255,255,.04); border: 1px solid var(--border-color);
      border-radius: 5px; padding: .1rem .4rem;
    }
    .btn-edit-icon   { color: var(--text-muted); font-size: .85rem; transition: color .15s; }
    .btn-delete-icon { color: var(--text-muted); font-size: .85rem; transition: color .15s; }
    .product-row:hover .btn-edit-icon   { color: #ff9a00; }
    .product-row:hover .btn-delete-icon { color: #f85149; }

    @media (max-width: 600px) {
      .product-row { grid-template-columns: 1fr auto auto; }
      .col-code { display: none; }
    }
  </style>
</head>
<body>

<button class="sidebar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-brand">
      <div class="brand-icon"><i class="bi bi-box-seam-fill"></i></div>
      <div>
        <div class="system-name">Sistema de Pedidos</div>
        <div class="user-name" id="sidebar-user">Carregando...</div>
      </div>
    </div>
  </div>
  <nav class="sidebar-nav">
    <a class="nav-link" href="/painel.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a class="nav-link" href="/clientes.html"><i class="bi bi-people"></i> Clientes</a>
    <div class="nav-group">
      <button class="nav-group-toggle has-active open" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
        <span><i class="bi bi-box-seam"></i> Produtos</span><span class="arrow">›</span>
      </button>
      <div class="nav-group-items open">
        <a class="nav-sub-link" href="/create-product.html"><i class="bi bi-plus-lg"></i> Cadastrar Produto</a>
        <a class="nav-sub-link active" href="/list-products.html"><i class="bi bi-list-ul"></i> Lista de Produtos</a>
      </div>
    </div>
    <div class="nav-group">
      <button class="nav-group-toggle" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
        <span><i class="bi bi-bag-check"></i> Pedidos</span><span class="arrow">›</span>
      </button>
      <div class="nav-group-items">
        <a class="nav-sub-link" href="/create-order.html"><i class="bi bi-plus-lg"></i> Criar Pedido</a>
        <a class="nav-sub-link" href="/list-orders.html"><i class="bi bi-list-ul"></i> Listar Pedidos</a>
      </div>
    </div>
    <a class="nav-link" href="/estoque.html"><i class="bi bi-archive"></i> Estoque</a>
    <a class="nav-link" href="/entrega.html"><i class="bi bi-truck"></i> Entrega</a>
    <a class="nav-link" href="/promissorias.html"><i class="bi bi-receipt"></i> Promissórias</a>
  </nav>
  <div class="sidebar-footer">
    <button class="btn-logout" id="btn-logout"><i class="bi bi-box-arrow-left"></i> Sair</button>
  </div>
</div>

<div class="main-content">
  <div class="container-fluid py-3">

    <div class="d-flex align-items-center justify-content-between mb-4 gap-3 flex-wrap">
      <div class="form-page-hero">
        <div class="form-page-icon"><i class="bi bi-box-seam-fill"></i></div>
        <div>
          <div class="form-page-title">Lista de Produtos</div>
          <div class="form-page-sub" id="product-count">Carregando...</div>
        </div>
      </div>
      <div class="search-wrap">
        <i class="bi bi-search"></i>
        <input id="search" placeholder="Buscar por nome ou código...">
      </div>
    </div>

    <div id="products-container">
      <div class="text-center py-5" style="color:var(--text-muted)">
        <i class="bi bi-hourglass-split" style="font-size:2rem;opacity:.4"></i>
        <div class="mt-2">Carregando produtos...</div>
      </div>
    </div>

  </div>
</div>

<!-- Modal editar -->
<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header" style="background:linear-gradient(135deg,#f78166,#ff9a00);color:#fff">
        <h5 class="modal-title"><i class="bi bi-pencil-square me-2"></i>Editar Produto</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <form id="edit-form">
          <input type="hidden" id="edit-id">
          <div class="mb-3">
            <label class="form-label" style="font-size:.8rem;font-weight:600;color:var(--text-muted)">Nome do Produto</label>
            <input type="text" class="form-control" id="edit-name" required>
          </div>
          <div class="mb-3">
            <label class="form-label" style="font-size:.8rem;font-weight:600;color:var(--text-muted)">Código</label>
            <input type="text" class="form-control" id="edit-code" required>
          </div>
          <div class="mb-3">
            <label class="form-label" style="font-size:.8rem;font-weight:600;color:var(--text-muted)">Valor de Custo (R$)</label>
            <input type="number" step="0.01" min="0" class="form-control" id="edit-cost" required>
          </div>
          <div class="mb-4">
            <label class="form-label" style="font-size:.8rem;font-weight:600;color:var(--text-muted)">Franquia</label>
            <select class="form-select" id="edit-franchise" required>
              <option>Boticário</option><option>Natura</option><option>Abelha Rainha</option>
              <option>Eudora</option><option>Avon</option><option>Outros</option>
            </select>
          </div>
          <div class="mb-2">
            <label class="form-label" style="font-size:.8rem;font-weight:600;color:var(--text-muted)">Preço de venda (R$)</label>
            <input type="text" class="form-control" id="edit-sale-ro" readonly>
          </div>
          <div class="mb-2">
            <label class="form-label" style="font-size:.8rem;font-weight:600;color:var(--text-muted)">Desconto (atalho)</label>
            <div class="input-group">
              <input type="number" step="0.01" min="0" class="form-control" id="edit-desc-valor" placeholder="0">
              <select class="form-select" id="edit-desc-tipo" style="max-width:90px"><option value="pct">%</option><option value="brl">R$</option></select>
              <button type="button" class="btn btn-outline-secondary" id="edit-desc-aplicar">Aplicar</button>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label" style="font-size:.8rem;font-weight:600;color:var(--text-muted)">Preço promocional (R$) — deixe em branco para remover</label>
            <input type="number" step="0.01" min="0" class="form-control" id="edit-promo">
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary flex-grow-1"><i class="bi bi-check-lg me-1"></i>Salvar alterações</button>
            <button type="button" class="btn btn-danger" id="btn-delete"><i class="bi bi-trash3"></i></button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<footer class="text-center py-3 mt-4">
  <small>&copy; 2025 Sistema de Pedidos</small>
</footer>

<script>window.location.replace('/produtos.html#listar');</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
<script src="/js/auth.js"></script>
<script>
  Auth.requireAuth();
  Auth.initSidebar();
  document.getElementById('sidebarToggle').addEventListener('click', () =>
    document.getElementById('sidebar').classList.toggle('open'));

  const fmt = v => Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  let allProducts = [];
  const editModal = new bootstrap.Modal(document.getElementById('editModal'));

  // Mapa visual por franquia
  const franchiseMap = {
    'Boticário':     { icon: 'bi-flower1',     color: '#9b59b6', bg: 'rgba(155,89,182,.12)' },
    'Natura':        { icon: 'bi-tree',         color: '#27ae60', bg: 'rgba(39,174,96,.12)'  },
    'Abelha Rainha': { icon: 'bi-emoji-smile',  color: '#f39c12', bg: 'rgba(243,156,18,.12)' },
    'Eudora':        { icon: 'bi-stars',         color: '#e74c3c', bg: 'rgba(231,76,60,.12)'  },
    'Avon':          { icon: 'bi-gem',           color: '#e91e8c', bg: 'rgba(233,30,140,.12)' },
    'Outros':        { icon: 'bi-three-dots',    color: '#8b949e', bg: 'rgba(139,148,158,.12)'}
  };

  function getFranchise(name) {
    return franchiseMap[name] || { icon: 'bi-box', color: '#ff9a00', bg: 'rgba(255,154,0,.12)' };
  }

  async function loadProducts() {
    const res   = await Auth.apiFetch('/api/products/all');
    allProducts = await res.json();
    renderProducts(allProducts);
  }

  // Guarda quais franquias estão abertas entre re-renders
  const openFranchises = new Set();

  function renderProducts(list) {
    const container = document.getElementById('products-container');
    document.getElementById('product-count').textContent =
      `${list.length} produto${list.length !== 1 ? 's' : ''} cadastrado${list.length !== 1 ? 's' : ''}`;

    if (!list.length) {
      container.innerHTML = `<div class="text-center py-5" style="color:var(--text-muted)">
        <i class="bi bi-inbox" style="font-size:2.5rem;opacity:.35"></i>
        <div class="mt-2">Nenhum produto encontrado.</div></div>`;
      return;
    }

    const grouped = {};
    list.forEach(p => { (grouped[p.franchise] = grouped[p.franchise] || []).push(p); });

    // Se pesquisa ativa, abre todas as franquias com resultados
    const isSearch = document.getElementById('search').value.trim().length > 0;

    container.innerHTML = Object.keys(grouped).sort().map(fr => {
      const f    = getFranchise(fr);
      const isOpen = isSearch || openFranchises.has(fr);
      return `
      <div class="franchise-block" data-franchise="${esc(fr)}">
        <div class="franchise-header ${isOpen ? 'open' : ''}" onclick="toggleFranchise(this, '${esc(fr)}')">
          <div class="franchise-header-left">
            <div class="franchise-icon" style="background:${f.bg};color:${f.color}">
              <i class="bi ${f.icon}"></i>
            </div>
            <span class="franchise-name">${esc(fr)}</span>
            <span class="franchise-count">${grouped[fr].length}</span>
          </div>
          <i class="bi bi-chevron-right franchise-chevron"></i>
        </div>
        <div class="franchise-body ${isOpen ? 'open' : ''}">
          ${grouped[fr].map(p => `
            <div class="product-row">
              <div class="product-field" style="font-weight:500;cursor:pointer" onclick="openEdit(${p.id})">${esc(p.name)}</div>
              <div class="product-code col-code">${esc(p.code)}</div>
              <div class="product-field" style="color:#3fb950;font-weight:600;white-space:nowrap">${fmt(p.cost)}</div>
              <div style="display:flex;align-items:center;gap:.35rem">
                <span class="btn-edit-icon" onclick="openEdit(${p.id})" style="cursor:pointer" title="Editar"><i class="bi bi-pencil"></i></span>
                <span class="btn-delete-icon" onclick="excluirProduto(${p.id}, '${esc(p.name)}')" title="Excluir"><i class="bi bi-trash3"></i></span>
              </div>
            </div>`).join('')}
        </div>
      </div>`;
    }).join('');
  }

  function toggleFranchise(header, name) {
    const body = header.nextElementSibling;
    const isOpen = header.classList.contains('open');
    header.classList.toggle('open', !isOpen);
    body.classList.toggle('open', !isOpen);
    if (!isOpen) openFranchises.add(name);
    else          openFranchises.delete(name);
  }

  function openEdit(id) {
    const p = allProducts.find(x => x.id === id);
    if (!p) return;
    document.getElementById('edit-id').value        = p.id;
    document.getElementById('edit-name').value      = p.name;
    document.getElementById('edit-code').value      = p.code;
    document.getElementById('edit-cost').value      = p.cost;
    document.getElementById('edit-franchise').value = p.franchise;
    document.getElementById('edit-sale-ro').value = (p.sale_value != null ? Number(p.sale_value).toFixed(2) : '');
    document.getElementById('edit-promo').value = (p.promotion_price != null && Number(p.promotion_price) > 0) ? Number(p.promotion_price).toFixed(2) : '';
    document.getElementById('edit-desc-valor').value = '';
    editModal.show();
  }

  document.getElementById('edit-desc-aplicar').addEventListener('click', function () {
    var sale = parseFloat(document.getElementById('edit-sale-ro').value);
    var v = parseFloat(document.getElementById('edit-desc-valor').value);
    if (!(sale > 0) || isNaN(v) || v < 0) return;
    var tipo = document.getElementById('edit-desc-tipo').value;
    var promo = tipo === 'pct' ? sale * (1 - v / 100) : sale - v;
    promo = Math.max(0, Math.round((promo + Number.EPSILON) * 100) / 100);
    document.getElementById('edit-promo').value = promo.toFixed(2);
  });

  document.getElementById('edit-form').addEventListener('submit', async e => {
    e.preventDefault();
    const id = document.getElementById('edit-id').value;
    const payload = {
      name:            document.getElementById('edit-name').value.trim(),
      code:            document.getElementById('edit-code').value.trim(),
      cost:            parseFloat(document.getElementById('edit-cost').value),
      franchise:       document.getElementById('edit-franchise').value,
      promotion_price: (function () { var x = document.getElementById('edit-promo').value.trim(); return x !== '' ? parseFloat(x) : null; })()
    };
    const res  = await Auth.apiFetch(`/api/products/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
    const data = await res.json();
    if (!res.ok) return Swal.fire('Erro', data.error, 'error');
    editModal.hide();
    Swal.fire({ icon: 'success', title: 'Salvo!', timer: 1200, showConfirmButton: false });
    loadProducts();
  });

  document.getElementById('btn-delete').addEventListener('click', async () => {
    const id = document.getElementById('edit-id').value;
    const { isConfirmed } = await Swal.fire({
      title: 'Excluir produto?', icon: 'warning',
      showCancelButton: true, confirmButtonColor: '#b91c1c',
      confirmButtonText: 'Excluir', cancelButtonText: 'Cancelar'
    });
    if (!isConfirmed) return;
    const res  = await Auth.apiFetch(`/api/products/${id}`, { method: 'DELETE' });
    const data = await res.json();
    if (!res.ok) return Swal.fire('Erro', data.error, 'error');
    editModal.hide();
    Swal.fire({ icon: 'success', title: 'Excluído!', timer: 1200, showConfirmButton: false });
    loadProducts();
  });

  async function excluirProduto(id, nome) {
    const { isConfirmed } = await Swal.fire({
      title: `Excluir "${nome}"?`, icon: 'warning',
      showCancelButton: true, confirmButtonColor: '#b91c1c',
      confirmButtonText: 'Excluir', cancelButtonText: 'Cancelar'
    });
    if (!isConfirmed) return;
    const res  = await Auth.apiFetch(`/api/products/${id}`, { method: 'DELETE' });
    const data = await res.json();
    if (!res.ok) return Swal.fire('Erro', data.error, 'error');
    Swal.fire({ icon: 'success', title: 'Excluído!', timer: 1200, showConfirmButton: false });
    loadProducts();
  }

  document.getElementById('search').addEventListener('input', e => {
    const q = e.target.value.toLowerCase();
    renderProducts(q ? allProducts.filter(p =>
      p.name.toLowerCase().includes(q) || p.code.toLowerCase().includes(q)
    ) : allProducts);
  });

  function esc(v) {
    return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  loadProducts();
</script>
</body>
</html>

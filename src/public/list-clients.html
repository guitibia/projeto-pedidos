<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Clientes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<button class="sidebar-toggle" id="sidebarToggle">☰</button>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="system-name">📦 Sistema de Pedidos</div>
    <div class="user-name" id="sidebar-user">Carregando...</div>
  </div>
  <nav class="sidebar-nav">
    <a class="nav-link" href="/">Dashboard</a>
    <a class="nav-link" href="/create-client.html">Cadastrar Cliente</a>
    <a class="nav-link" href="/create-product.html">Cadastrar Produto</a>
    <a class="nav-link" href="/create-order.html">Criar Pedido</a>
    <a class="nav-link" href="/list-orders.html">Listar Pedidos</a>
    <a class="nav-link active" href="/list-clients.html">Listar Clientes</a>
    <a class="nav-link" href="/promissorias.html">Promissórias</a>
  </nav>
  <div class="sidebar-footer">
    <button class="btn-logout" id="btn-logout">Sair</button>
  </div>
</div>

<div class="main-content">
  <div class="container py-2">
    <h4 class="mb-4">Clientes</h4>

    <div class="row g-3 mb-4">
      <div class="col-md-6">
        <label class="form-label">Selecione um Cliente</label>
        <select id="clientSelect" class="form-select" onchange="loadClientOrders()">
          <option value="">Escolha um cliente</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Filtrar por Status</label>
        <select id="statusSelect" class="form-select" onchange="loadClientOrders()">
          <option value="Todos">Todos</option>
          <option value="Pendente">Pendente</option>
          <option value="Entregue">Entregue</option>
        </select>
      </div>
    </div>

    <div class="card">
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th class="ps-3">#</th>
              <th>Pagamento</th>
              <th>Status</th>
              <th class="pe-3">Detalhes</th>
            </tr>
          </thead>
          <tbody id="ordersList">
            <tr><td colspan="4" class="text-center text-muted py-4">Selecione um cliente para ver os pedidos.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal detalhes -->
<div class="modal fade" id="orderDetailsModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title">Detalhes do Pedido</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="orderDetailsContent"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
      </div>
    </div>
  </div>
</div>

<footer class="bg-dark text-white text-center py-3 mt-4">
  <small>&copy; 2025 Sistema de Pedidos</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
<script src="/js/auth.js"></script>
<script>
  Auth.requireAuth();
  Auth.initSidebar();
  document.getElementById('sidebarToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));

  const fmt = v => Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

  async function loadClients() {
    const res = await Auth.apiFetch('/api/clients');
    const clients = await res.json();
    const sel = document.getElementById('clientSelect');
    clients.forEach(c => sel.insertAdjacentHTML('beforeend', `<option value="${c.id}">${c.name}</option>`));
  }

  async function loadClientOrders() {
    const clientId = document.getElementById('clientSelect').value;
    const status   = document.getElementById('statusSelect').value;
    const tbody    = document.getElementById('ordersList');

    if (!clientId) {
      tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-4">Selecione um cliente.</td></tr>';
      return;
    }

    const res    = await Auth.apiFetch(`/api/client-orders/${clientId}?status=${status}`);
    const orders = await res.json();
    tbody.innerHTML = '';

    if (!orders.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-4">Nenhum pedido encontrado.</td></tr>';
      return;
    }

    orders.forEach(o => {
      const badge = o.status === 'Entregue'
        ? '<span class="badge bg-success">Entregue</span>'
        : '<span class="badge bg-warning text-dark">Pendente</span>';
      tbody.insertAdjacentHTML('beforeend', `
        <tr>
          <td class="ps-3">${o.id}</td>
          <td>${o.payment_method}</td>
          <td>${badge}</td>
          <td class="pe-3">
            <button class="btn btn-sm btn-info" onclick="viewOrderDetails(${o.id})">Ver</button>
          </td>
        </tr>`);
    });
  }

  async function viewOrderDetails(id) {
    const res   = await Auth.apiFetch(`/api/orders/${id}`);
    const order = await res.json();

    const totalVenda = order.products.reduce((s, p) => s + p.sale_price * (p.quantity || 1), 0);
    const totalCusto = order.products.reduce((s, p) => s + p.cost_price * (p.quantity || 1), 0);

    const prodHTML = order.products.map(p => `
      <div class="text-muted ms-2 mb-1" style="font-size:.88rem">
        ${p.product_name} — COD ${p.code} &nbsp;|&nbsp; Qtd: ${p.quantity} &nbsp;|&nbsp;
        Custo: ${fmt(p.cost_price * p.quantity)} &nbsp;|&nbsp; Venda: ${fmt(p.sale_price * p.quantity)}
      </div>`).join('');

    let paymentInfo = `<strong>Pagamento:</strong> ${order.payment_method}`;
    if (order.installments > 1) paymentInfo += ` — ${order.installments}x de ${fmt(totalVenda / order.installments)}`;
    if (order.combined_payment_value) paymentInfo += ` | PIX/Dinheiro: ${fmt(order.combined_payment_value)}`;

    document.getElementById('orderDetailsContent').innerHTML = `
      <p><strong>Pedido #${order.id}</strong></p>
      <p><strong>Cliente:</strong> ${order.client_name}</p>
      <p><strong>Endereço:</strong> ${order.client_address}, ${order.client_house_number} — ${order.client_neighborhood}</p>
      <p>${paymentInfo}</p>
      <hr>
      <p class="fw-500 mb-2">Produtos:</p>
      ${prodHTML}
      <hr>
      <p class="mb-1"><strong>Total Custo:</strong> ${fmt(totalCusto)} &nbsp; <strong>Total Venda:</strong> ${fmt(totalVenda)}</p>
      <p><strong>Lucro:</strong> ${fmt(totalVenda - totalCusto)}</p>`;

    new bootstrap.Modal(document.getElementById('orderDetailsModal')).show();
  }

  loadClients();
</script>
</body>
</html>

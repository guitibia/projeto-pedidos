<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastrar Produto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .form-page-hero {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.75rem;
    }
    .form-page-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: linear-gradient(135deg, #f78166 0%, #ff9a00 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(255,154,0,.35);
    }
    .form-page-title { font-size: 1.3rem; font-weight: 700; margin: 0; }
    .form-page-sub   { font-size: .8rem; color: var(--text-muted); margin: 0; }

    .field-group {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.25rem 1.25rem .75rem;
      margin-bottom: 1rem;
    }
    .field-group-title {
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--text-muted);
      margin-bottom: .9rem;
      display: flex;
      align-items: center;
      gap: .4rem;
    }
    .field-group-title i { font-size: .85rem; }

    .form-label {
      font-size: .8rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: .3rem;
    }
    .input-icon-wrap {
      position: relative;
    }
    .input-icon-wrap i {
      position: absolute;
      left: .75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: .95rem;
      pointer-events: none;
    }
    .input-icon-wrap .form-control,
    .input-icon-wrap .form-select {
      padding-left: 2.3rem;
    }

    /* Franchise badge selector */
    .franchise-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: .5rem;
    }
    .franchise-option { display: none; }
    .franchise-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .3rem;
      padding: .6rem .4rem;
      border-radius: 10px;
      border: 1.5px solid var(--border-color);
      cursor: pointer;
      font-size: .72rem;
      font-weight: 600;
      color: var(--text-muted);
      transition: all .15s;
      text-align: center;
      background: transparent;
    }
    .franchise-label i { font-size: 1.3rem; }
    .franchise-option:checked + .franchise-label {
      border-color: #ff9a00;
      background: rgba(255,154,0,.12);
      color: #ff9a00;
    }
    /* franchise colors on hover */
    .franchise-label:hover { border-color: rgba(255,154,0,.4); color: var(--text-color); }

    .btn-submit-form {
      width: 100%;
      padding: .7rem;
      font-size: .95rem;
      font-weight: 600;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #f78166 0%, #ff9a00 100%);
      color: #fff;
      cursor: pointer;
      transition: opacity .15s, box-shadow .15s;
      box-shadow: 0 4px 14px rgba(255,154,0,.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
    }
    .btn-submit-form:hover { opacity: .92; box-shadow: 0 6px 18px rgba(255,154,0,.4); }
  </style>
</head>
<body>

<button class="sidebar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-brand">
      <div class="brand-icon"><i class="bi bi-box-seam-fill"></i></div>
      <div>
        <div class="system-name">Sistema de Pedidos</div>
        <div class="user-name" id="sidebar-user">Carregando...</div>
      </div>
    </div>
  </div>
  <nav class="sidebar-nav"></nav>
  <div class="sidebar-footer">
    <button class="btn-logout" id="btn-logout"><i class="bi bi-box-arrow-left"></i> Sair</button>
  </div>
</div>

<div class="main-content">
  <div class="container py-3" style="max-width:560px">

    <!-- Hero -->
    <div class="form-page-hero">
      <div class="form-page-icon"><i class="bi bi-box-seam-fill"></i></div>
      <div>
        <div class="form-page-title">Cadastrar Produto</div>
        <div class="form-page-sub">Preencha os dados para registrar um novo produto</div>
      </div>
    </div>

    <form id="productForm">

      <!-- Informações do produto -->
      <div class="field-group">
        <div class="field-group-title"><i class="bi bi-info-circle"></i> Informações do Produto</div>

        <div class="mb-3">
          <label class="form-label">Nome do Produto</label>
          <div class="input-icon-wrap">
            <i class="bi bi-tag"></i>
            <input type="text" class="form-control" id="name" placeholder="Nome do produto" required>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Código do Produto</label>
          <div class="input-icon-wrap">
            <i class="bi bi-upc-scan"></i>
            <input type="text" class="form-control" id="code" placeholder="Código de referência" required>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Valor de Custo</label>
          <div class="input-icon-wrap">
            <i class="bi bi-cash-coin"></i>
            <input type="number" step="0.01" min="0" class="form-control" id="cost" placeholder="0,00" required>
          </div>
        </div>

        <div class="mb-0">
          <label class="form-label">Estoque Inicial <span style="opacity:.5;font-weight:400">(opcional)</span></label>
          <div class="input-icon-wrap">
            <i class="bi bi-archive"></i>
            <input type="number" min="0" class="form-control" id="estoqueInicial" placeholder="0">
          </div>
        </div>
      </div>

      <!-- Franquia -->
      <div class="field-group">
        <div class="field-group-title"><i class="bi bi-shop"></i> Franquia</div>

        <div class="franchise-grid">
          <div>
            <input type="radio" class="franchise-option" name="franchise" id="fr-boticario" value="Boticário" required>
            <label class="franchise-label" for="fr-boticario">
              <i class="bi bi-flower1" style="color:#9b59b6"></i> Boticário
            </label>
          </div>
          <div>
            <input type="radio" class="franchise-option" name="franchise" id="fr-natura" value="Natura/Avon" required>
            <label class="franchise-label" for="fr-natura">
              <i class="bi bi-tree" style="color:#27ae60"></i> Natura/Avon
            </label>
          </div>
          <div>
            <input type="radio" class="franchise-option" name="franchise" id="fr-abelha" value="Abelha Rainha" required>
            <label class="franchise-label" for="fr-abelha">
              <i class="bi bi-emoji-smile" style="color:#f39c12"></i> Abelha Rainha
            </label>
          </div>
          <div>
            <input type="radio" class="franchise-option" name="franchise" id="fr-eudora" value="Eudora" required>
            <label class="franchise-label" for="fr-eudora">
              <i class="bi bi-stars" style="color:#e74c3c"></i> Eudora
            </label>
          </div>
          <div>
            <input type="radio" class="franchise-option" name="franchise" id="fr-outros" value="Outros" required>
            <label class="franchise-label" for="fr-outros">
              <i class="bi bi-three-dots" style="color:#8b949e"></i> Outros
            </label>
          </div>
        </div>
        <input type="hidden" id="franchise" name="franchise_val">
      </div>

      <button type="submit" class="btn-submit-form">
        <i class="bi bi-box-arrow-in-down"></i> Cadastrar Produto
      </button>

    </form>
  </div>
</div>

<footer class="text-center py-3 mt-4">
  <small>&copy; 2025 Sistema de Pedidos</small>
</footer>

<script>window.location.replace('/produtos.html');</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
<script src="/js/auth.js"></script>
<script>
  Auth.requireAuth();
  Auth.initSidebar();
  document.getElementById('sidebarToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));

  // Sync hidden input with radio selection
  document.querySelectorAll('.franchise-option').forEach(radio => {
    radio.addEventListener('change', () => {
      document.getElementById('franchise').value = radio.value;
    });
  });

  document.getElementById('productForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const franchiseSelected = document.querySelector('.franchise-option:checked');
    if (!franchiseSelected) return Swal.fire('Atenção', 'Selecione uma franquia.', 'warning');

    const estoqueInicial = parseInt(document.getElementById('estoqueInicial').value) || 0;
    const payload = {
      name:           document.getElementById('name').value.trim(),
      cost:           parseFloat(document.getElementById('cost').value),
      franchise:      franchiseSelected.value,
      code:           document.getElementById('code').value.trim(),
      estoqueInicial
    };

    try {
      const res  = await Auth.apiFetch('/api/products', { method: 'POST', body: JSON.stringify(payload) });
      const data = await res.json();
      if (!res.ok) return Swal.fire('Erro', data.error, 'error');
      Swal.fire({ icon: 'success', title: 'Produto cadastrado!', text: 'O produto foi registrado com sucesso.', timer: 2000, showConfirmButton: false });
      document.getElementById('productForm').reset();
    } catch {
      Swal.fire('Erro', 'Erro ao conectar ao servidor.', 'error');
    }
  });
</script>
</body>
</html>

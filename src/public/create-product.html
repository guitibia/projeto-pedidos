<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastrar Produto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<button class="sidebar-toggle" id="sidebarToggle">☰</button>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="system-name">📦 Sistema de Pedidos</div>
    <div class="user-name" id="sidebar-user">Carregando...</div>
  </div>
  <nav class="sidebar-nav">
    <a class="nav-link" href="/">Dashboard</a>
    <a class="nav-link" href="/create-client.html">Cadastrar Cliente</a>
    <a class="nav-link active" href="/create-product.html">Cadastrar Produto</a>
    <a class="nav-link" href="/create-order.html">Criar Pedido</a>
    <a class="nav-link" href="/list-orders.html">Listar Pedidos</a>
    <a class="nav-link" href="/list-clients.html">Listar Clientes</a>
    <a class="nav-link" href="/promissorias.html">Promissórias</a>
  </nav>
  <div class="sidebar-footer">
    <button class="btn-logout" id="btn-logout">Sair</button>
  </div>
</div>

<div class="main-content">
  <div class="container py-2">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card">
          <div class="card-header bg-primary text-white text-center">Cadastro de Produto</div>
          <div class="card-body p-4">
            <form id="productForm">
              <div class="mb-3">
                <label class="form-label">Nome do Produto</label>
                <input type="text" class="form-control" id="name" placeholder="Nome do produto" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Valor de Custo</label>
                <input type="number" step="0.01" min="0" class="form-control" id="cost" placeholder="0,00" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Franquia</label>
                <select class="form-select" id="franchise" required>
                  <option value="">Selecione a franquia</option>
                  <option value="Boticário">Boticário</option>
                  <option value="Natura">Natura</option>
                  <option value="Abelha Rainha">Abelha Rainha</option>
                  <option value="Eudora">Eudora</option>
                  <option value="Avon">Avon</option>
                  <option value="Outros">Outros</option>
                </select>
              </div>
              <div class="mb-4">
                <label class="form-label">Código do Produto</label>
                <input type="text" class="form-control" id="code" placeholder="Código" required>
              </div>
              <button type="submit" class="btn btn-primary w-100">Cadastrar Produto</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<footer class="bg-dark text-white text-center py-3 mt-4">
  <small>&copy; 2025 Sistema de Pedidos</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
<script src="/js/auth.js"></script>
<script>
  Auth.requireAuth();
  Auth.initSidebar();
  document.getElementById('sidebarToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));

  document.getElementById('productForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const payload = {
      name:      document.getElementById('name').value.trim(),
      cost:      parseFloat(document.getElementById('cost').value),
      franchise: document.getElementById('franchise').value,
      code:      document.getElementById('code').value.trim()
    };

    try {
      const res = await Auth.apiFetch('/api/products', { method: 'POST', body: JSON.stringify(payload) });
      const data = await res.json();
      if (!res.ok) return Swal.fire('Erro', data.error, 'error');
      Swal.fire('Sucesso', 'Produto cadastrado com sucesso!', 'success');
      document.getElementById('productForm').reset();
    } catch {
      Swal.fire('Erro', 'Erro ao conectar ao servidor.', 'error');
    }
  });
</script>
</body>
</html>

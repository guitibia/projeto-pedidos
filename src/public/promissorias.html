<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promissórias</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<button class="sidebar-toggle" id="sidebarToggle">☰</button>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="system-name">📦 Sistema de Pedidos</div>
    <div class="user-name" id="sidebar-user">Carregando...</div>
  </div>
  <nav class="sidebar-nav">
    <a class="nav-link" href="/">Dashboard</a>
    <a class="nav-link" href="/create-client.html">Cadastrar Cliente</a>
    <a class="nav-link" href="/create-product.html">Cadastrar Produto</a>
    <a class="nav-link" href="/create-order.html">Criar Pedido</a>
    <a class="nav-link" href="/list-orders.html">Listar Pedidos</a>
    <a class="nav-link" href="/list-clients.html">Listar Clientes</a>
    <a class="nav-link active" href="/promissorias.html">Promissórias</a>
  </nav>
  <div class="sidebar-footer">
    <button class="btn-logout" id="btn-logout">Sair</button>
  </div>
</div>

<div class="main-content">
  <div class="container py-2">
    <div class="d-flex align-items-center justify-content-between mb-4">
      <h4 class="mb-0">Promissórias</h4>
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#cadastrarModal">
        + Nova Promissória
      </button>
    </div>

    <div id="promissorias-container"></div>
  </div>
</div>

<!-- Modal cadastrar -->
<div class="modal fade" id="cadastrarModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title">Cadastrar Promissória</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="promissoria-form">
          <div class="mb-3">
            <label class="form-label">Número da Nota Fiscal</label>
            <input type="text" class="form-control" id="numero_nf" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Data de Emissão</label>
            <input type="date" class="form-control" id="data_emissao" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Valor da Nota Fiscal</label>
            <input type="number" step="0.01" class="form-control" id="valor_nf" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Número de Parcelas</label>
            <input type="number" class="form-control" id="parcelas" min="1" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Valor por Parcela</label>
            <input type="text" class="form-control" id="valor_parcela" readonly>
          </div>
          <div class="mb-4">
            <label class="form-label">Vencimento da 1ª Parcela</label>
            <input type="date" class="form-control" id="data_vencimento" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
        </form>
      </div>
    </div>
  </div>
</div>

<footer class="bg-dark text-white text-center py-3 mt-4">
  <small>&copy; 2025 Sistema de Pedidos</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
<script src="/js/auth.js"></script>
<script>
  Auth.requireAuth();
  Auth.initSidebar();
  document.getElementById('sidebarToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));

  const fmt = v => Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  const fmtDate = d => d ? new Date(d).toLocaleDateString('pt-BR', { timeZone: 'UTC' }) : '—';

  // Calcular valor da parcela automaticamente
  ['valor_nf', 'parcelas'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      const v = parseFloat(document.getElementById('valor_nf').value) || 0;
      const p = parseInt(document.getElementById('parcelas').value) || 1;
      document.getElementById('valor_parcela').value = (v / p).toFixed(2);
    });
  });

  document.getElementById('promissoria-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const payload = {
      numero_nf:      document.getElementById('numero_nf').value,
      data_emissao:   document.getElementById('data_emissao').value,
      valor_nf:       parseFloat(document.getElementById('valor_nf').value),
      parcelas:       parseInt(document.getElementById('parcelas').value),
      valor_parcela:  parseFloat(document.getElementById('valor_parcela').value),
      data_vencimento: document.getElementById('data_vencimento').value
    };

    const res  = await Auth.apiFetch('/api/promissorias', { method: 'POST', body: JSON.stringify(payload) });
    const data = await res.json();
    if (!res.ok) return Swal.fire('Erro', data.error, 'error');

    Swal.fire('Sucesso', data.message, 'success');
    bootstrap.Modal.getInstance(document.getElementById('cadastrarModal')).hide();
    document.getElementById('promissoria-form').reset();
    loadPromissorias();
  });

  async function loadPromissorias() {
    const res  = await Auth.apiFetch('/api/promissorias');
    const data = await res.json();
    const container = document.getElementById('promissorias-container');

    if (!data.length) {
      container.innerHTML = '<p class="text-muted text-center py-4">Nenhuma promissória cadastrada.</p>';
      return;
    }

    container.innerHTML = data.map(prom => `
      <div class="card mb-3">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start mb-2">
            <div>
              <span class="fw-600">NF nº ${prom.numero_nf}</span>
              <span class="text-muted ms-2" style="font-size:.85rem">Valor total: ${fmt(prom.valor)}</span>
            </div>
            <button class="btn btn-sm btn-danger" onclick="excluirPromissoria(${prom.id})">Excluir</button>
          </div>
          <div class="row g-2">
            ${prom.parcelas.map((parc, i) => `
              <div class="col-sm-6 col-lg-4">
                <div class="d-flex align-items-center justify-content-between p-2 rounded" style="background:#f8f9fa;border:1px solid #e9ecef">
                  <div>
                    <div style="font-size:.8rem;color:#6c757d">${i + 1}ª parcela</div>
                    <div style="font-size:.85rem">${fmtDate(parc.data_vencimento)}</div>
                  </div>
                  <div class="d-flex align-items-center gap-2">
                    <span class="badge ${parc.status === 'Pago' ? 'bg-success' : 'bg-warning text-dark'}">${parc.status}</span>
                    ${parc.status !== 'Pago'
                      ? `<button class="btn btn-sm btn-outline-success py-0 px-2" style="font-size:.75rem"
                           onclick="marcarPaga(${prom.id}, ${i + 1})">Pagar</button>`
                      : ''}
                  </div>
                </div>
              </div>`).join('')}
          </div>
        </div>
      </div>`).join('');
  }

  async function marcarPaga(promId, parcelaNum) {
    const res = await Auth.apiFetch(`/api/promissorias/${promId}/parcelas/${parcelaNum}`, {
      method: 'PUT',
      body: JSON.stringify({ status: 'Pago' })
    });
    if (res.ok) loadPromissorias();
    else Swal.fire('Erro', 'Não foi possível atualizar.', 'error');
  }

  async function excluirPromissoria(id) {
    const { isConfirmed } = await Swal.fire({
      title: 'Excluir promissória?', icon: 'warning',
      showCancelButton: true, confirmButtonColor: '#dc3545',
      confirmButtonText: 'Excluir', cancelButtonText: 'Cancelar'
    });
    if (!isConfirmed) return;
    const res = await Auth.apiFetch(`/api/promissorias/${id}`, { method: 'DELETE' });
    if (res.ok) { Swal.fire('Excluído!', '', 'success'); loadPromissorias(); }
    else Swal.fire('Erro', 'Não foi possível excluir.', 'error');
  }

  loadPromissorias();
</script>
</body>
</html>

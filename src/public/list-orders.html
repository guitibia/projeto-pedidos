<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Pedidos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.0/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<button class="sidebar-toggle" id="sidebarToggle">☰</button>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="system-name">📦 Sistema de Pedidos</div>
    <div class="user-name" id="sidebar-user">Carregando...</div>
  </div>
  <nav class="sidebar-nav">
    <a class="nav-link" href="/">Dashboard</a>
    <a class="nav-link" href="/create-client.html">Cadastrar Cliente</a>
    <a class="nav-link" href="/create-product.html">Cadastrar Produto</a>
    <a class="nav-link" href="/create-order.html">Criar Pedido</a>
    <a class="nav-link active" href="/list-orders.html">Listar Pedidos</a>
    <a class="nav-link" href="/list-clients.html">Listar Clientes</a>
    <a class="nav-link" href="/promissorias.html">Promissórias</a>
  </nav>
  <div class="sidebar-footer">
    <button class="btn-logout" id="btn-logout">Sair</button>
  </div>
</div>

<div class="main-content">
  <div class="container py-2">
    <div class="d-flex align-items-center justify-content-between mb-4">
      <h4 class="mb-0">Pedidos</h4>
      <select id="statusFilter" class="form-select w-auto" onchange="loadOrders()">
        <option value="Todos">Todos</option>
        <option value="Pendente">Pendente</option>
        <option value="Entregue">Entregue</option>
      </select>
    </div>

    <div class="card">
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th class="ps-3">#</th>
              <th>Cliente</th>
              <th>Pagamento</th>
              <th>Status</th>
              <th>Total</th>
              <th class="pe-3">Ações</th>
            </tr>
          </thead>
          <tbody id="ordersList"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal detalhes -->
<div class="modal fade" id="orderDetailsModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title">Detalhes do Pedido</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="orderDetailsContent"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
        <button class="btn btn-outline-primary" id="printButton"><i class="bi bi-printer"></i> Imprimir</button>
        <button class="btn btn-success" id="markAsDeliveredButton"><i class="bi bi-check-circle"></i> Marcar como Entregue</button>
      </div>
    </div>
  </div>
</div>

<footer class="bg-dark text-white text-center py-3 mt-4">
  <small>&copy; 2025 Sistema de Pedidos</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
<script src="/js/auth.js"></script>
<script>
  Auth.requireAuth();
  Auth.initSidebar();
  document.getElementById('sidebarToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));

  const fmt = v => Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

  async function loadOrders() {
    const status = document.getElementById('statusFilter').value;
    const url = status === 'Todos' ? '/api/orders' : `/api/orders?status=${status}`;
    const res = await Auth.apiFetch(url);
    const orders = await res.json();
    const tbody = document.getElementById('ordersList');
    tbody.innerHTML = '';
    if (!orders.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">Nenhum pedido encontrado.</td></tr>';
      return;
    }
    orders.forEach(o => {
      const badge = o.status === 'Entregue'
        ? '<span class="badge bg-success">Entregue</span>'
        : '<span class="badge bg-warning text-dark">Pendente</span>';
      tbody.insertAdjacentHTML('beforeend', `
        <tr>
          <td class="ps-3">${o.id}</td>
          <td>${o.client_name}</td>
          <td>${o.payment_method}</td>
          <td>${badge}</td>
          <td>${fmt(o.total_cost)}</td>
          <td class="pe-3">
            <button class="btn btn-sm btn-info me-1" onclick="viewOrder(${o.id})"><i class="bi bi-eye"></i></button>
            <button class="btn btn-sm btn-danger" onclick="deleteOrder(${o.id})"><i class="bi bi-trash"></i></button>
          </td>
        </tr>`);
    });
  }

  async function deleteOrder(id) {
    const { isConfirmed } = await Swal.fire({
      title: 'Excluir pedido?', text: 'Esta ação é irreversível!',
      icon: 'warning', showCancelButton: true,
      confirmButtonColor: '#dc3545', confirmButtonText: 'Excluir',
      cancelButtonText: 'Cancelar'
    });
    if (!isConfirmed) return;
    const res = await Auth.apiFetch(`/api/orders/${id}`, { method: 'DELETE' });
    if (res.ok) { Swal.fire('Excluído!', '', 'success'); loadOrders(); }
    else Swal.fire('Erro', 'Não foi possível excluir.', 'error');
  }

  async function viewOrder(id) {
    const res   = await Auth.apiFetch(`/api/orders/${id}`);
    const order = await res.json();

    const totalVenda = order.products.reduce((s, p) => s + p.sale_price * (p.quantity || 1), 0);
    const totalCusto = order.products.reduce((s, p) => s + p.cost_price * (p.quantity || 1), 0);

    // Agrupar por franquia
    const grouped = order.products.reduce((acc, p) => {
      (acc[p.franchise] = acc[p.franchise] || []).push(p);
      return acc;
    }, {});

    const prodHTML = Object.entries(grouped).map(([fr, prods]) => `
      <div class="mb-2"><strong>${fr}</strong>
        ${prods.map(p => `<div class="ms-3 text-muted" style="font-size:.9rem">
          ${p.product_name} — COD ${p.code} &nbsp;|&nbsp;
          Qtd: ${p.quantity} &nbsp;|&nbsp;
          Custo: ${fmt(p.cost_price * p.quantity)} &nbsp;|&nbsp;
          Venda: ${fmt(p.sale_price * p.quantity)}
          ${p.not_came ? '<span class="badge bg-danger ms-1">Não veio</span>' : ''}
        </div>`).join('')}
      </div>`).join('');

    document.getElementById('orderDetailsContent').innerHTML = `
      <p><strong>Pedido #${order.id}</strong> — ${order.client_name}</p>
      <p class="text-muted mb-3">${order.client_address}, ${order.client_house_number} — ${order.client_neighborhood}</p>
      <p><strong>Pagamento:</strong> ${order.payment_method}
        ${order.installments > 1 ? ` — ${order.installments}x de ${fmt(totalVenda / order.installments)}` : ''}
        ${order.combined_payment_value ? ` | PIX/Dinheiro: ${fmt(order.combined_payment_value)}` : ''}</p>
      <hr>${prodHTML}<hr>
      <p class="mb-1"><strong>Custo total:</strong> ${fmt(totalCusto)} &nbsp; <strong>Venda total:</strong> ${fmt(totalVenda)}</p>
      <p><strong>Lucro:</strong> ${fmt(totalVenda - totalCusto)}</p>`;

    document.getElementById('markAsDeliveredButton').onclick = () => markDelivered(id);
    document.getElementById('printButton').onclick = () => printOrder(order);
    new bootstrap.Modal(document.getElementById('orderDetailsModal')).show();
  }

  async function markDelivered(id) {
    const res = await Auth.apiFetch(`/api/orders/${id}/status`, {
      method: 'PUT', body: JSON.stringify({ status: 'Entregue' })
    });
    if (res.ok) { Swal.fire('Sucesso', 'Pedido marcado como entregue!', 'success'); loadOrders(); }
    else Swal.fire('Erro', 'Não foi possível atualizar.', 'error');
  }

  function printOrder(order) {
    const w = window.open('', '', 'width=800,height=600');
    const totalVenda = order.products.reduce((s,p) => s + p.sale_price * (p.quantity||1), 0).toFixed(2);
    const totalCusto = order.products.reduce((s,p) => s + p.cost_price * (p.quantity||1), 0).toFixed(2);
    w.document.write(`<html><head><title>Pedido #${order.id}</title>
      <style>body{font-family:Arial,sans-serif;padding:20px;color:#333}h3{text-align:center}hr{border-color:#ccc}.row{display:flex;gap:8px;margin-bottom:4px}</style>
    </head><body>
      <h3>Pedido #${order.id}</h3>
      <p><strong>Cliente:</strong> ${order.client_name}</p>
      <p><strong>Endereço:</strong> ${order.client_address}, ${order.client_house_number} — ${order.client_neighborhood}</p>
      <p><strong>Pagamento:</strong> ${order.payment_method}</p><hr>
      ${order.products.map(p=>`<div class="row">${p.product_name} — COD ${p.code} — Qtd ${p.quantity} — R$ ${(p.sale_price*p.quantity).toFixed(2)}</div>`).join('')}
      <hr><p><strong>Total Venda: R$ ${totalVenda}</strong> &nbsp; Total Custo: R$ ${totalCusto} &nbsp; Lucro: R$ ${(totalVenda-totalCusto).toFixed(2)}</p>
    </body></html>`);
    w.document.close(); w.print();
  }

  loadOrders();
</script>
</body>
</html>
